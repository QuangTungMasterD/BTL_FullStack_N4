version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_attendance
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Tung@2005
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  student-attendance-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-attendance-service
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTION_STRING_ATTENDANCE=Server=sqlserver;Database=StudentAttendanceDb;User Id=sa;Password=Tung@2005;TrustServerCertificate=True;
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data: